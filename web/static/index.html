<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitor de Detecção de Pessoas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-950 text-gray-100">
  <div class="max-w-6xl mx-auto px-4 py-8">
    <header class="mb-8 flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold">Monitor de Detecção de Pessoas</h1>
        <p class="text-gray-400 text-sm mt-1">
          Painel local somente leitura das imagens salvas pelo monitor.
        </p>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button
          id="monitor-btn"
          disabled
          class="text-sm px-4 py-1.5 rounded-md bg-gray-700 text-white font-medium transition opacity-60"
        >
          Carregando...
        </button>
        <button
          id="refresh-btn"
          class="text-sm px-3 py-1.5 rounded-md bg-gray-800 hover:bg-gray-700 transition"
        >
          Atualizar
        </button>
        <a
          href="/alerts.html"
          class="text-sm px-3 py-1.5 rounded-md bg-gray-800 hover:bg-gray-700 transition inline-block text-gray-300"
        >
          Histórico de Alertas
        </a>
        <a
          href="/webcam.html"
          class="text-sm px-3 py-1.5 rounded-md bg-gray-800 hover:bg-gray-700 transition inline-block text-gray-300"
        >
          Usar minha câmera
        </a>
        <button
          id="logout-btn"
          class="text-sm px-3 py-1.5 rounded-md bg-gray-800 hover:bg-gray-700 transition text-gray-300"
        >
          Sair
        </button>
      </div>
    </header>

    <section id="status-cards" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-10"></section>

    <section>
      <h2 class="text-lg font-medium mb-4">Detecções</h2>

      <div id="empty-state" class="hidden text-center text-gray-500 py-16 border border-dashed border-gray-800 rounded-lg">
        Nenhuma detecção registrada ainda.
      </div>

      <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>
  </div>

  <div
    id="lightbox"
    class="hidden fixed inset-0 bg-black/90 items-center justify-center p-4 z-50"
  >
    <button id="lightbox-close" class="absolute top-4 right-6 text-white text-3xl leading-none">&times;</button>
    <img id="lightbox-img" class="max-h-full max-w-full rounded-lg shadow-2xl" alt="Detecção ampliada" />
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
