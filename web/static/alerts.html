<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histórico de Alertas — Monitor de Detecção de Pessoas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-950 text-gray-100">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <header class="mb-8 flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold">Histórico de Alertas</h1>
        <p class="text-gray-400 text-sm mt-1">
          Registro de todas as detecções, do mais recente para o mais antigo.
        </p>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <a
          href="/"
          class="text-sm px-3 py-1.5 rounded-md bg-gray-800 hover:bg-gray-700 transition inline-block"
        >
          Voltar ao painel
        </a>
        <button
          id="refresh-btn"
          class="text-sm px-3 py-1.5 rounded-md bg-gray-800 hover:bg-gray-700 transition"
        >
          Atualizar
        </button>
      </div>
    </header>

    <div
      id="empty-state"
      class="hidden text-center text-gray-500 py-16 border border-dashed border-gray-800 rounded-lg"
    >
      Nenhum alerta registrado ainda.
    </div>

    <div id="alerts-list" class="space-y-3"></div>

    <div class="mt-6 text-center">
      <button
        id="load-more-btn"
        class="hidden text-sm px-4 py-2 rounded-md bg-gray-800 hover:bg-gray-700 transition"
      >
        Carregar mais
      </button>
    </div>
  </div>

  <div
    id="lightbox"
    class="hidden fixed inset-0 bg-black/90 items-center justify-center p-4 z-50"
  >
    <button id="lightbox-close" class="absolute top-4 right-6 text-white text-3xl leading-none">&times;</button>
    <img id="lightbox-img" class="max-h-full max-w-full rounded-lg shadow-2xl" alt="Alerta ampliado" />
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/alerts.js"></script>
</body>
</html>
